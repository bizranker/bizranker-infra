apiVersion: v1
kind: ConfigMap
metadata:
  name: simple-prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-prometheus
  template:
    metadata:
      labels:
        app: simple-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=6h"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: simple-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: simple-prometheus
  namespace: monitoring
spec:
  selector:
    app: simple-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
